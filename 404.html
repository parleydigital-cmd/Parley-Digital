<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Parley Digital</title>
  <meta name="description" content="The page you are looking for could not be found. Return to Parley Digital's homepage.">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">

  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      background: linear-gradient(135deg, var(--color-dark) 0%, #162d50 100%);
      color: var(--color-white);
    }
    .error-content {
      max-width: 600px;
    }
    .error-code {
      font-family: var(--font-heading);
      font-size: clamp(6rem, 15vw, 12rem);
      font-weight: 700;
      background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 10px;
    }
    .error-content h1 {
      font-size: 2rem;
      margin-bottom: 20px;
    }
    .error-content p {
      color: var(--color-gray);
      margin-bottom: 40px;
      font-size: 1.125rem;
    }
    .error-actions {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <main class="error-page">
    <div class="error-content">
      <div class="error-code">404</div>
      <h1>Page Not Found</h1>
      <p>Sorry, the page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
      <div class="error-actions">
        <a href="index.html" class="btn-primary">Back to Home</a>
        <a href="contact.html" class="btn-secondary" style="border-color: var(--color-white); color: var(--color-white);">Contact Us</a>
      </div>
    </div>
  </main>
</body>
</html>
